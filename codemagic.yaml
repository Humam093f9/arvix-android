workflows:
  android-build:
    name: Arvix APK
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Setup
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build APK
        script: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
